<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body, #window-bleed {
        background: #1A1A1A;
        margin: 0;
        padding: 0;
      }
      #root { background: #0F0F0F; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; touch-action: manipulation; }
      #window-bleed { position: fixed; inset: 0; z-index: -1; }
      #root { position: fixed; inset: 0; width: 100%; height: 100%; }
    </style>
    <link rel="icon" type="image/svg+xml" href="/odeon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Odeon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="window-bleed" aria-hidden="true"></div>
    <div id="boot-fallback" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#fbbf24;font:bold 16px system-ui,sans-serif;z-index:9999;pointer-events:none">
      Loading Odeon…
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener("error", function (e) {
        var el = document.getElementById("root");
        if (el) {
          el.innerHTML = "<pre style=\"padding:24px;color:#f87171;font:12px monospace;white-space:pre-wrap\">"
            + (e.error && e.error.stack ? e.error.stack : e.message)
            + "</pre>";
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
